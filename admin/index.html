<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GO SUMMIT Admin — Registrations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;--fg:#f5f5f7;--fg-soft:#a1a1a6;--line:rgba(255,255,255,.1);
  --glass:rgba(10,10,10,.65);--serif:"Playfair Display",Georgia,serif;
  --sans:"Source Sans 3",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  --gutter:10vw;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);line-height:1.6}
a{color:inherit;text-decoration:none}
.nav{position:fixed;top:0;left:0;right:0;z-index:60;backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);background:var(--glass);border-bottom:1px solid var(--line)}
.nav-inner{width:80vw;margin:0 auto;padding:14px 0;display:flex;align-items:center;justify-content:space-between;font-size:14px;letter-spacing:0}
.wordmark{display:inline-flex;align-items:center;gap:10px}
.wordmark img{height:68px;width:auto;display:block;filter:brightness(.98) contrast(1.02)}
.wordmark .sep{display:inline-block;margin-left:10px;padding-left:12px;border-left:1px solid var(--line);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-soft);font-weight:500}
main{padding:130px var(--gutter) 70px}
.hero{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:24px}
.hero h1{font-family:var(--serif);font-size:clamp(38px,5vw,72px);line-height:.95;letter-spacing:-.02em}
.hero p{color:var(--fg-soft);margin-top:12px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
input,button{font:inherit}
.field{background:#060606;border:1px solid var(--line);color:var(--fg);padding:10px 12px;border-radius:10px;min-width:240px}
.btn{padding:10px 14px;border-radius:999px;border:1px solid var(--fg);background:var(--fg);color:#000;cursor:pointer;font-weight:600}
.btn.ghost{background:transparent;color:var(--fg);border-color:var(--line)}
.hint{color:var(--fg-soft);font-size:14px}
.table-wrap{border:1px solid var(--line);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:980px}
th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}
th{font-size:12px;color:var(--fg-soft);text-transform:uppercase;letter-spacing:.14em;background:#050505;position:sticky;top:0}
tbody tr:hover{background:rgba(255,255,255,.02)}
@media (max-width:900px){
  :root{--gutter:6vw}
  .wordmark .sep{display:none}
  .field{min-width:100%}
}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="wordmark"><img src="../assets/go-summit-logo.png" alt="GO Summit" /><span class="sep">ADMIN REGISTRATIONS</span></a>
  </div>
</nav>

<main>
  <section class="hero">
    <h1>Registration Admin</h1>
    <p>Use your Railway `ADMIN_KEY` to view and export attendee submissions.</p>
  </section>

  <div class="toolbar">
    <input id="api-base" class="field" type="text" value="https://gosummit-production.up.railway.app" />
    <input id="admin-key" class="field" type="password" placeholder="ADMIN_KEY" />
    <input id="limit" class="field" type="number" min="1" max="500" value="200" />
    <button id="load-btn" class="btn">Load</button>
    <button id="csv-btn" class="btn ghost">Export CSV</button>
  </div>
  <p class="hint" id="hint">No data loaded yet.</p>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Submitted At</th>
          <th>City</th>
          <th>Name</th>
          <th>Title</th>
          <th>Company</th>
          <th>Email</th>
          <th>Company Type</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>

<script>
const rowsEl = document.getElementById("rows");
const hintEl = document.getElementById("hint");
const apiBaseEl = document.getElementById("api-base");
const adminKeyEl = document.getElementById("admin-key");
const limitEl = document.getElementById("limit");
const loadBtn = document.getElementById("load-btn");
const csvBtn = document.getElementById("csv-btn");

let cachedItems = [];

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[m]));
}

function toCsvValue(value) {
  const s = String(value ?? "");
  return /[",\n]/.test(s) ? `"${s.replace(/"/g, "\"\"")}"` : s;
}

function renderRows(items) {
  rowsEl.innerHTML = items.map((item) => `
    <tr>
      <td>${esc(item.id)}</td>
      <td>${esc(item.submittedAt)}</td>
      <td>${esc(item.city)}</td>
      <td>${esc(item.name)}</td>
      <td>${esc(item.title)}</td>
      <td>${esc(item.company)}</td>
      <td>${esc(item.email)}</td>
      <td>${esc(item.companyType)}</td>
    </tr>
  `).join("");
}

async function loadData() {
  const base = apiBaseEl.value.trim().replace(/\/+$/, "");
  const key = adminKeyEl.value.trim();
  const limit = Math.min(Math.max(Number(limitEl.value || 200), 1), 500);
  if (!base || !key) {
    hintEl.textContent = "Please provide API base URL and ADMIN_KEY.";
    return;
  }

  hintEl.textContent = "Loading...";
  loadBtn.disabled = true;

  try {
    const url = `${base}/api/registrations?key=${encodeURIComponent(key)}&limit=${limit}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      throw new Error(data.message || "Failed to load registrations.");
    }
    cachedItems = Array.isArray(data.items) ? data.items : [];
    renderRows(cachedItems);
    hintEl.textContent = `Loaded ${cachedItems.length} registration(s).`;
    localStorage.setItem("gosummit_admin_base", base);
  } catch (err) {
    hintEl.textContent = "Load failed: " + err.message;
  } finally {
    loadBtn.disabled = false;
  }
}

function exportCsv() {
  if (!cachedItems.length) {
    hintEl.textContent = "No data to export yet.";
    return;
  }
  const header = ["id","submittedAt","city","name","title","company","email","companyType"];
  const lines = [header.join(",")].concat(
    cachedItems.map((item) => header.map((key) => toCsvValue(item[key])).join(","))
  );
  const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `gosummit-registrations-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(link);
  link.click();
  URL.revokeObjectURL(link.href);
  link.remove();
}

const savedBase = localStorage.getItem("gosummit_admin_base");
if (savedBase) apiBaseEl.value = savedBase;

loadBtn.addEventListener("click", loadData);
csvBtn.addEventListener("click", exportCsv);
</script>
</body>
</html>
